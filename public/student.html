<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chi tiết học viên — Marisa OJ Tracker</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <a href="index.html" class="back-link">← Về Dashboard</a>
      </div>
      <div class="topbar-actions">
        <span class="role-pill" id="role-pill"></span>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="profile">
      <div class="profile-avatar" id="profile-avatar">?</div>
      <div class="profile-info">
        <h1 id="profile-name">—</h1>
        <p class="muted" id="profile-username">—</p>
        <div class="profile-badges" id="profile-badges"></div>
      </div>
      <div class="profile-today" id="profile-today"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Lộ trình học</h2>
        <span class="muted">Chọn một dạng để mở danh sách bài và tick minh chứng AC</span>
      </div>
      <div class="curriculum" id="curriculum"></div>
    </section>

    <section class="section calendar-section">
      <div class="section-head">
        <h2>Lịch làm bài</h2>
        <div class="calendar-nav">
          <button class="btn btn-ghost" id="prev-month">‹</button>
          <span id="calendar-month-label"></span>
          <button class="btn btn-ghost" id="next-month">›</button>
        </div>
      </div>
      <div class="calendar-legend">
        <span><i class="dot dot-none"></i> Không làm (0)</span>
        <span><i class="dot dot-warn"></i> Chưa đủ (1–4)</span>
        <span><i class="dot dot-ok"></i> Đủ bài (5–9)</span>
        <span><i class="dot dot-great"></i> Xuất sắc (≥10)</span>
        <span><i class="dot dot-today"></i> Hôm nay</span>
      </div>
      <div class="calendar" id="calendar"></div>
    </section>

    <section class="section" id="day-detail-section" hidden>
      <div class="section-head">
        <h2 id="day-title">Chi tiết ngày</h2>
        <button class="btn btn-ghost" id="close-day">Đóng</button>
      </div>
      <div id="day-detail"></div>
    </section>
  </main>

  <!-- Modal preview ảnh -->
  <div class="modal" id="preview-modal" hidden>
    <div class="modal-backdrop" data-close-preview="1"></div>
    <div class="modal-body">
      <button class="modal-close" data-close-preview="1">✕</button>
      <img id="preview-img" alt="Ảnh nháp" />
      <div class="modal-caption" id="preview-caption"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
  <script>renderStudentPage();</script>
</body>
</html>
